name: Publish to PyPI

# Publishes to PyPI when you cut a GitHub Release. Uses PyPI Trusted Publishing
# (OIDC) — no API token or secret is stored anywhere in the repo.
on:
  release:
    types: [published]

jobs:
  build:
    name: Build distribution
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Verify release tag matches pyproject version
        run: |
          TAG="${GITHUB_REF_NAME#v}"
          VER=$(python -c "import tomllib, pathlib; print(tomllib.loads(pathlib.Path('pyproject.toml').read_text())['project']['version'])")
          echo "release tag: $TAG | pyproject version: $VER"
          if [ "$TAG" != "$VER" ]; then
            echo "::error::Release tag ($TAG) does not match pyproject version ($VER). Bump the version in pyproject.toml before tagging."
            exit 1
          fi

      - name: Build sdist and wheel
        run: |
          python -m pip install --upgrade build twine
          python -m build
          python -m twine check dist/*

      - name: Upload distribution artifacts
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/

  publish:
    name: Publish to PyPI
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: pypi
      url: https://pypi.org/project/FourierMesh/
    permissions:
      id-token: write # REQUIRED for Trusted Publishing (OIDC); no token needed
    steps:
      - name: Download distribution artifacts
        uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
